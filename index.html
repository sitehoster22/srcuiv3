<!DOCTYPE html>
<html lang="en">
<head>
    
 
<meta charset="UTF-8">
    
 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
   
<title>Movie/TV Show Finder</title>
    
   
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
     

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-top: 50px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        #search {
            width: 60%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        #searchBtn {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            background-color: #007BFF;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        #searchBtn:hover {
            background-color: #0056b3;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .result-item {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }
        .result-item:hover {
            transform: translateY(-5px);
        }
        .result-item h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .result-item button {
            padding: 10px;
            border: none;
            background-color: #28a745;
            color: white;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }
        .result-item button:hover {
            background-color: #218838;
        }
        #videoPlayer {
            margin-top: 40px;
            display: none;
            text-align: center;
        }
        iframe {
            width: 80%;
            height: 400px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        
    
<h1>Movie/TV Show Finder</h1>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search for a movie or TV show...">
            
          
<button id="searchBtn">Search</button>
        
        </
</div>
        <div id="results" class="results"></div>
        
        <div id="videoPlayer">
            
            <
<h2>Video Player</h2>
            <iframe id="videoFrame" allowfullscreen></iframe>
        
  
</div>
    
    
</div>

    <script src="script.js"></script>
</body>
</html>
