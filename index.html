<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & TV Show Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #searchInput {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #333;
            background-color: #333;
            color: white;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .card p {
            font-size: 14px;
            color: #aaa;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #player {
            margin-top: 30px;
            aspect-ratio: 16/9;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: none;
        }

        .season-form {
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .season-form input {
            padding: 8px;
            margin: 5px;
            background-color: #444;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-container">
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="Search for movies or TV shows...">
                <button type="submit">Search</button>
            </form>
        </div>

        <div id="results" class="results"></div>
        <div id="player"></div>
    </div>

    <script>
        const TMDB_API_KEY = 'a9d2bf9eb920e7d3004d6a8a43a06596'; // Replace with your TMDB API key

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value;
            if (query) searchMedia(query);
        });

        async function searchMedia(query) {
            try {
                const response = await fetch(
                    `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`
                );
                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            results.forEach(item => {
                if (item.media_type === 'movie' || item.media_type === 'tv') {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    card.innerHTML = `
                        <img src="${item.poster_path ? 
                            `https://image.tmdb.org/t/p/w500${item.poster_path}` : 
                            'https://via.placeholder.com/200x300?text=No+Image'}" 
                            alt="${item.title || item.name}">
                        <div class="card-content">
                            <h3>${item.title || item.name}</h3>
                            <p>${item.overview || 'No description available'}</p>
                            <button onclick="handlePlay(${item.id}, '${item.media_type}')">Play</button>
                        </div>
                    `;

                    resultsContainer.appendChild(card);
                }
            });
        }

        function handlePlay(id, mediaType) {
            if (mediaType === 'movie') {
                playMovie(id);
            } else if (mediaType === 'tv') {
                showSeasonForm(id);
            }
        }

        function playMovie(tmdbId) {
            const embedUrl = `https://vidsrc.su/embed/movie/${tmdbId}`;
            document.getElementById('player').innerHTML = `
                <iframe src="${embedUrl}" allowfullscreen></iframe>
            `;
        }

        function showSeasonForm(tmdbId) {
            document.getElementById('player').innerHTML = `
                <div class="season-form">
                    <h3>Enter Season and Episode</h3>
                    <input type="number" id="seasonInput" placeholder="Season" min="1" required>
                    <input type="number" id="episodeInput" placeholder="Episode" min="1" required>
                    <button onclick="playTVShow(${tmdbId})">Play</button>
                </div>
            `;
        }

        function playTVShow(tmdbId) {
            const season = document.getElementById('seasonInput').value;
            const episode = document.getElementById('episodeInput').value;
            
            if (season && episode) {
                const embedUrl = `https://vidsrc.su/embed/tv/${tmdbId}/${season}/${episode}`;
                document.getElementById('player').innerHTML = `
                    <iframe src="${embedUrl}" allowfullscreen></iframe>
                `;
            }
        }
    </script>
</body>
</html>
